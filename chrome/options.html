<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pichunter settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>pichunter settings</h1>
      <form id="settingsForm">
        <fieldset>
          <legend>Output folder</legend>
          <p class="hint">
            Choose a local folder for saved images. If permission is unavailable, pichunter uses the browser Downloads folder.
          </p>
          <button id="chooseDirectoryButton" type="button">Choose folder...</button>
          <button id="clearDirectoryButton" class="secondary" type="button">Use Downloads folder</button>
          <p id="directoryStatus" class="status" role="status"></p>
        </fieldset>
        <label for="baseFolder">Fallback base folder inside Downloads</label>
        <input id="baseFolder" name="baseFolder" type="text" placeholder="pichunter" autocomplete="off">
        <p class="hint">
          Used when no folder is selected. Final path: Downloads/&lt;base folder&gt;/&lt;domain&gt;/&lt;page title&gt;/&lt;image file&gt;
        </p>
        <button type="submit">Save</button>
      </form>
      <p id="status" class="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
